name: CI

on:
  push:
  pull_request:
    branches: [ main ]
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch:

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          PYTHONPATH=. pytest tests/unit --cov=src/main.py --cov-report=xml --cov-fail-under=85

      - name: Upload unit coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: udesa-software/notifications
          files: ./coverage.xml
          flags: unit
          fail_ci_if_error: true

  integration-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run integration tests with coverage
        run: |
          PYTHONPATH=. pytest tests/integration --cov=src --cov-report=xml

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: udesa-software/notifications
          files: ./coverage.xml
          flags: integration
          fail_ci_if_error: true
